apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-frontend
  template:
    metadata:
      labels:
        app: todo-frontend
    spec:
      containers:
        - name: todo-frontend
          image: us-central1-docker.pkg.dev/cisc5550-491409/todo-repo/todo-frontend:v2
          ports:
            - containerPort: 80