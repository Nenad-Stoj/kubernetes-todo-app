<div class="bg-white rounded-2xl shadow-lg p-6">
  <h2 class="text-2xl font-bold text-slate-800 mb-6">
    Profile
  </h2>

  <div *ngIf="profile" class="mb-8">
    <img
      *ngIf="profile.profile_image"
      [src]="profile.profile_image"
      class="w-24 h-24 rounded-full object-cover mb-4"
    />

    <p class="text-lg font-semibold">
      {{ profile.username }}
    </p>

    <label class="block mt-4 mb-2 font-semibold">
      Preferred Translation Language
    </label>

    <select
      [(ngModel)]="selectedLanguage"
      class="border border-slate-300 rounded-xl p-3"
    >
      <option value="mk">Macedonian</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="de">German</option>
      <option value="it">Italian</option>
    </select>

    <button
      type="button"
      (click)="saveLanguage()"
      class="ml-3 bg-blue-600 text-white px-5 py-2 rounded-xl font-semibold transition hover:bg-blue-700 active:scale-95"
    >
      Save
    </button>

    <div class="mt-6">
      <label class="block mb-2 font-semibold">
        Upload Profile Image
      </label>

      <input type="file" accept="image/*" (change)="uploadImage($event)" />
    </div>
  </div>

  <h2 class="text-2xl font-bold text-slate-800 mb-4">
    Leaderboard
  </h2>

  <table class="w-full">
    <thead>
      <tr class="bg-slate-800 text-white">
        <th class="p-3 text-left">User</th>
        <th class="p-3 text-left">Completed Tasks</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let user of leaderboard" class="border-b">
        <td class="p-3 flex items-center gap-3">
          <img
            *ngIf="user.profile_image"
            [src]="user.profile_image"
            class="w-10 h-10 rounded-full object-cover"
          />
          {{ user.username }}
        </td>

        <td class="p-3 font-bold">
          {{ user.completed_tasks }}
        </td>
      </tr>
    </tbody>
  </table>
</div>
